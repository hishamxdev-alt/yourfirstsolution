<!-- [ngStyle]="{'background-image': 'url(' + Banner + ')'}" -->
<div class=" section-header-bg text-center container-fluid"   >
  <h3 class="section-title  ">  {{sectorHeader}}</h3>
  <h4 class="text-blur" style="padding-bottom: 50px;font-size: 15px;">{{subHeader}}</h4>

</div>
<section class="section album-container bg-dark ">
    <div class="container">

  <div class="album-grid">
    <ng-container *ngIf="sector!='media'" >
      <div [ngClass]="IsClassSize ? image.size : 'image.size'" class=" "   *ngFor="let image of arrayImages">
        <h3 *ngIf="image.title!=''" class="album-item">{{image.title}}</h3> 
        <img [ngClass]="IsClassSize ? image.size : 'image.size'"  class=" "[src]="image.image_src|fullImagePath" [alt]="image.title" />
    </div>

    <!-- <div *ngIf="arrayImages.length==0" class="album-item large"> photo</div>
    <div *ngIf="arrayImages.length==0" class="album-item small"> photo</div>
    <div *ngIf="arrayImages.length==0" class="album-item small"> photo</div>
    <div *ngIf="arrayImages.length==0" class="album-item small"> photo</div>
    <div *ngIf="arrayImages.length==0" class="album-item small"> photo</div>
 
    <div *ngIf="arrayImages.length==0" class="album-item medium"> photo</div>
    <div *ngIf="arrayImages.length==0" class="album-item large"> photo</div>
    <div *ngIf="arrayImages.length==0" class="album-item medium"> photo</div> -->



    </ng-container>
  


   
   </div>

    
  <ng-container *ngIf="sector=='media'" >
    <div class="filter-container">
      <div class="btn-group">
        <button *ngFor="let category of categories"
                (click)="setCategory(category.name)"
                [class.active]="selectedCategory === category.name"
                class="btn">
          {{ category.name }}
        </button>
      </div>
    </div>
    
     <div class="video-grid">
      <div class="video-item" *ngFor="let video of filterVideos()">
        <!-- <h3 class="section-sub-title">{{ video.title }}</h3> -->

        <iframe [src]="getEmbedUrl(video.id)| safeUrl" height="auto"  
        allowfullscreen lazyload frameborder="0" 
        allow="clipboard-write" refererPolicy="strict-origin-when-cross-origin">
        </iframe>

 
      </div>

  

    </div>
</ng-container>





</div>

 
</section>

<div class="section-area-bottom  "  >
  <div class="section-sub text-center container">

      <p style=" 
      left: 43%;
      margin-top: 25px;
      font-weight: bold; color: #fff;">Ready to start our growth journey?</p>
      <p style="     
   
      margin-top: 40px;
      font-size: small;
      font-weight: bold; color: #fff;" class="text-blur">Join us now</p>

      <figure class="features-banner"  [routerLink]="['/contact']">
        <img id="join-us" 
          src="../../assets/print.png"              
          loading="lazy"
          alt="Join Us Now"
          class="  "
          style="  opacity: 0.8;
          height: 150px; "
        />
      </figure>

  </div>
 
</div>
